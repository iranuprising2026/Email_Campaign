<!DOCTYPE html>

<meta charset="UTF-8">

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 16px;
  background: linear-gradient(to bottom right, #f7fafc, #e6f0ff);
}

h2 {
  text-align: center;
  color: #1a365d;
}

.instructions {
  background: white;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  line-height: 1.5;
}

select, textarea, input, button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
}

button {
  background: linear-gradient(to right, #2b6cb0, #2c5282);
  color: white;
  border: none;
  cursor: pointer;
}

textarea { min-height: 200px; }

.chart-container {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 20px;

<body>

<h2>Email Dutch Politicians</h2>

<p class="instructions">
<strong>Instructions:</strong><br>
Choose a politician and version → Generate → Send or Copy.<br>
📊 Tip: Choose less-used options for more impact.<br><br>
<hr>
<strong>دستورالعمل:</strong><br>
یک سیاستمدار و نسخه را انتخاب کنید → تولید → ارسال یا کپی.<br>
📊 نکته: گزینه‌های کمتر استفاده‌شده را انتخاب کنید.
</p>

<input id="username" placeholder="Your name">
<input id="city" placeholder="City (optional)">

<select id="politician"></select>
<select id="version"></select>

<button onclick="generateEmail()">Generate Email</button>

<input id="subject" readonly>
<input id="recipient" readonly>
<textarea id="output" readonly></textarea>

<a id="sendBtn"><button onclick="track('send')">Open Email App</button></a>
<button onclick="copyAll(); track('copy')">Copy All</button>

<div class="chart-container">
<canvas id="politicianChart"></canvas>
</div>

<div class="chart-container">

// dropdown init
Object.keys(politicians).forEach(p=>{
  let o=document.createElement("option"); o.text=p;
  document.getElementById("politician").add(o);
});

["Version 1","Version 2","Version 3","Version 4","Version 5"]
.forEach(v=>{
  let o=document.createElement("option"); o.text=v;
  document.getElementById("version").add(o);
});

// generate
function generateEmail(){
  const dropdownValue = politician.value;
  const pol = dropdownValue.replace(/\s*\(.*?\)/,"");
  const ver = version.value;
  const user = username.value || "An Iranian Resident in the Netherlands";
  const city = cityInput.value || "";

  const recipient = politicians[dropdownValue].join(",");
  const subjectText = emailSubjects[ver];

  let body = emails[ver]
    .replace(/\[NAME\]/g, pol)
    .replace(/\[USER\]/g, user)
    .replace(/\[CITY\]/g, city);

  subject.value = subjectText;
  recipientField.value = recipient;
  output.value = body;

  sendBtn.href =
    `mailto:${recipient}?subject=${encodeURIComponent(subjectText)}&body=${encodeURIComponent(body)}`;
}

// tracking
function track(type){
  let polData = JSON.parse(localStorage.getItem("pol")||"{}");
  let verData = JSON.parse(localStorage.getItem("ver")||"{}");

  polData[politician.value]=(polData[politician.value]||0)+1;
  verData[version.value]=(verData[version.value]||0)+1;

  localStorage.setItem("pol",JSON.stringify(polData));
  localStorage.setItem("ver",JSON.stringify(verData));

  updateCharts();
}

// copy
function copyAll(){
  navigator.clipboard.writeText(
`To: ${recipientField.value}
Subject: ${subject.value}

${output.value}`);
}

// charts
let pc, vc;
function updateCharts(){
  let polData = JSON.parse(localStorage.getItem("pol")||"{}");
  let verData = JSON.parse(localStorage.getItem("ver")||"{}");

  let polLabels = Object.keys(politicians);
  let polValues = polLabels.map(p=>polData[p]||0);
  let verValues = ["Version 1","Version 2","Version 3","Version 4","Version 5"]
    .map(v=>verData[v]||0);

  if(pc) pc.destroy();
  if(vc) vc.destroy();

  pc = new Chart(politicianChart,{type:'bar',data:{labels:polLabels,datasets:[{data:polValues}]}})
  vc = new Chart(versionChart,{type:'bar',data:{labels:["Version 1","Version 2","Version 3","Version 4","Version 5"],datasets:[{data:verValues}]}})
}

updateCharts();

</script>

</body>
</html>
