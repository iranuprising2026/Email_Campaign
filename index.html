<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Dutch Politicians</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f0f4f8; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        select, input, textarea, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .btn-gen { background: #2b6cb0; color: white; font-weight: bold; cursor: pointer; }
        .btn-web { background: #2c5282; color: white; font-weight: bold; }
        .btn-mob { background: #38a169; color: white; font-weight: bold; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row a { flex: 1; text-decoration: none; }
        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Email Dutch Politicians</h2>
        <input id="uName" placeholder="Name">
        <input id="uCity" placeholder="City">
        <select id="pSel"></select>
        <select id="vSel"></select>
        <button class="btn-gen" onclick="generate()">1. Generate Email</button>
    </div>

    <div class="box">
        <input id="oSub" placeholder="Subject" readonly>
        <input id="oRec" placeholder="Recipients" readonly>
        <textarea id="oBody" style="height: 150px;" readonly></textarea>
        <div class="flex-row">
            <a id="lWeb" href="#"><button type="button" class="btn-web">Open WEB/PC</button></a>
            <a id="lMob" href="#"><button type="button" class="btn-mob">Open MOBILE</button></a>
        </div>
    </div>

    <div class="box">
        <h4 style="text-align:center;">Action Tracker</h4>
        <div class="chart-container"><canvas id="statChart"></canvas></div>
    </div>

<script>
const S_URL = 'https://tizmgyhtydyudjozgbgq.supabase.co'; 
const S_KEY = 'sb_publishable_veX7XCXUYYswI-KOVRdK7A_B2rel21w';
const sb = supabase.createClient(S_URL, S_KEY);

const pols = {
    "Jan Paternotte (D66)": ["info@d66.nl","j.paternotte@tweedekamer.nl"],
    "Ruben Brekelmans (VVD)": ["info@vvd.nl","r.brekelmans@tweedekamer.nl"],
    "Jesse Klaver (GL-PvdA)": ["info@groenlinks.nl","j.klaver@tweedekamer.nl"],
    "Geert Wilders (PVV)": ["pvv.publiek@tweedekamer.nl","g.wilders@tweedekamer.nl"],
    "Henri Bontenbal (CDA)": ["info@cda.nl","h.bontenbal@tweedekamer.nl"],
    "Joost Eerdmans (JA21)": ["info@ja21.nl","b.eerdmans@tweedekamer.nl"],
    "Lidewij de Vos (FVD)": ["info@fvdemocratie.nl","l.dvos@tweedekamer.nl"],
    "Henk Vermeer (BBB)": ["info@bbb.nl","h.vermeer@tweedekamer.nl"],
    "Stephan van Baarle (DENK)": ["info@denk.nl","s.vbaarle@tweedekamer.nl"],
    "Chris Stoffer (SGP)": ["info@sgp.nl","c.stoffer@tweedekamer.nl"],
    "Esther Ouwehand (PvdD)": ["info@partijvdedieren.nl","esther.ouwehand@tweedekamer.nl"],
    "Mirjam Bikker (ChristenUnie)": ["info@christenunie.nl","m.bikker@tweedekamer.nl"],
    "Jimmy Dijk (SP)": ["info@sp.nl","j.dijk@tweedekamer.nl"],
    "Jan Struijs (50PLUS)": ["info@50pluspartij.nl","j.struijs@tweedekamer.nl"],
    "Laurens Dassen (Volt)": ["info@voltnederland.org","l.dassen@tweedekamer.nl"]
};

const subs = { "V1": "Action Regarding Iranian Sit-In", "V2": "Urgent Support Iranian Protest", "V3": "Protest Outside Ministry", "V4": "Embassy Closure Appeal", "V5": "Iranian Sit-In Support" };
const texts = { "V1": "Dutch:\nGeachte [NAME],\n\nEen groep Iraniërs voert al meer dan 75 dagen een sit-in uit...", "V2": "Dutch:\nGeachte [NAME],\n\nSupport needed for the sit-in...", "V3": "Dutch:\nGeachte [NAME],\n\nIranian protest appeal...", "V4": "Dutch:\nGeachte [NAME],\n\nClose the embassy...", "V5": "Dutch:\nGeachte [NAME],\n\nAction requested..." };

const ps = document.getElementById("pSel");
const vs = document.getElementById("vSel");
Object.keys(pols).forEach(p => { let o = document.createElement("option"); o.text = p; ps.add(o); });
Object.keys(subs).forEach(v => { let o = document.createElement("option"); o.text = v; vs.add(o); });

async function log(type) {
    await sb.from('email_stats').insert([{ politician_name: ps.value, version_name: vs.value, action_type: type }]);
    render();
}

function generate() {
    const p = ps.value, v = vs.value, n = p.split(' (')[0];
    const user = document.getElementById("uName").value || "Iranian Resident", city = document.getElementById("uCity").value || "";
    const to = pols[p][0], cc = pols[p][1], s = subs[v];
    const b = texts[v].replace(/\[NAME\]/g, n).replace(/\[USER\]/g, user).replace(/\[CITY\]/g, city);

    document.getElementById("oSub").value = s;
    document.getElementById("oRec").value = `${to}; ${cc}`;
    document.getElementById("oBody").value = b;

    const es = encodeURIComponent(s), eb = encodeURIComponent(b);
    document.getElementById("lWeb").href = `mailto:${to}%3B${cc}?cc=${cc}&subject=${es}&body=${eb}`;
    document.getElementById("lWeb").onclick = () => log("Web Click");
    document.getElementById("lMob").href = `mailto:${to},${cc}?cc=${cc}&subject=${es}&body=${eb}`;
    document.getElementById("lMob").onclick = () => log("Mobile Click");
    alert("Generated!");
}

let chart;
async function render() {
    const { data } = await sb.from('email_stats').select('politician_name, version_name');
    if (!data) return;
    const ctx = document.getElementById('statChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(pols).map(l => l.split(' (')[0]),
            datasets: Object.keys(subs).map((v, i) => ({
                label: v,
                data: Object.keys(pols).map(p => data.filter(r => r.politician_name === p && r.version_name === v).length),
                backgroundColor: ['#2b6cb0','#4299e1','#63b3ed','#90cdf4','#bee3f8'][i]
            }))
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } }
    });
}
window.onload = render;
</script>
</body>
</html>
