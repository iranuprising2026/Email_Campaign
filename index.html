<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Dutch Politicians</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f0f4f8; }
        .box { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        select, input, textarea, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        
        /* THE BUTTONS */
        .btn-generate { background: #2b6cb0; color: white; font-weight: bold; cursor: pointer; }
        .btn-web { background: #4299e1; color: white; font-weight: bold; }
        .btn-mobile { background: #48bb78; color: white; font-weight: bold; }
        .btn-copy { background: #718096; color: white; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row a { flex: 1; text-decoration: none; }
        
        canvas { max-height: 400px; }
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Email Dutch Politicians</h2>
        <div class="flex-row">
            <div style="font-size: 13px;">
                <strong>Steps:</strong> Select Politician > Select Version > Generate > Choose Web or Mobile button.
            </div>
            <div class="rtl" style="font-size: 13px;">
                <strong>مراحل:</strong> انتخاب سیاستمدار > انتخاب نسخه > زدن دکمه Generate > انتخاب دکمه وب یا موبایل.
            </div>
        </div>
    </div>

    <div class="box">
        <input id="user_name" placeholder="Your Name">
        <input id="user_city" placeholder="Your City">
        
        <select id="sel_pol"></select>
        <select id="sel_ver"></select>
        
        <button class="btn-generate" onclick="doGenerate()">1. Generate Email Content</button>
    </div>

    <div class="box">
        <label>Subject:</label>
        <input id="out_sub" readonly>
        <label>Recipients:</label>
        <input id="out_recp" readonly>
        <label>Body:</label>
        <textarea id="out_body" style="height: 150px;" readonly></textarea>

        <div class="flex-row">
            <a id="lnk_web" href="javascript:void(0)" onclick="checkReady(event)">
                <button type="button" class="btn-web">2a. Open Email (WEB)</button>
            </a>
            <a id="lnk_mobile" href="javascript:void(0)" onclick="checkReady(event)">
                <button type="button" class="btn-mobile">2b. Open Email (MOBILE)</button>
            </a>
        </div>
        
        <button class="btn-copy" onclick="doCopy()">3. Copy All to Clipboard</button>
    </div>

    <div class="box">
        <h4 style="text-align:center;">Action Tracker</h4>
        <canvas id="myChart"></canvas>
    </div>

<script>
// --- DATA ---
const politicians = {
    "Jan Paternotte (D66)": ["info@d66.nl","j.paternotte@tweedekamer.nl"],
    "Ruben Brekelmans (VVD)": ["info@vvd.nl","r.brekelmans@tweedekamer.nl"],
    "Jesse Klaver (GL-PvdA)": ["info@groenlinks.nl","j.klaver@tweedekamer.nl"],
    "Geert Wilders (PVV)": ["pvv.publiek@tweedekamer.nl","g.wilders@tweedekamer.nl"],
    "Henri Bontenbal (CDA)": ["info@cda.nl","h.bontenbal@tweedekamer.nl"],
    "Joost Eerdmans (JA21)": ["info@ja21.nl","b.eerdmans@tweedekamer.nl"],
    "Lidewij de Vos (FVD)": ["info@fvdemocratie.nl","l.dvos@tweedekamer.nl"],
    "Henk Vermeer (BBB)": ["info@bbb.nl","h.vermeer@tweedekamer.nl"],
    "Stephan van Baarle (DENK)": ["info@denk.nl","s.vbaarle@tweedekamer.nl"],
    "Chris Stoffer (SGP)": ["info@sgp.nl","c.stoffer@tweedekamer.nl"],
    "Esther Ouwehand (PvdD)": ["info@partijvdedieren.nl","esther.ouwehand@tweedekamer.nl"],
    "Mirjam Bikker (ChristenUnie)": ["info@christenunie.nl","m.bikker@tweedekamer.nl"],
    "Jimmy Dijk (SP)": ["info@sp.nl","j.dijk@tweedekamer.nl"],
    "Jan Struijs (50PLUS)": ["info@50pluspartij.nl","j.struijs@tweedekamer.nl"],
    "Laurens Dassen (Volt)": ["info@voltnederland.org","l.dassen@tweedekamer.nl"]
};

const subjects = {
    "Version 1": "Request for Action Regarding Iranian Sit-In Protest",
    "Version 2": "Urgent: Support Iranian Sit-In Protest",
    "Version 3": "Iranian Protest Outside Ministry – Please Support",
    "Version 4": "Action Needed: Iranian Sit-In and Embassy Closure",
    "Version 5": "Appeal: Support Iranian Sit-In and Transitional Leadership"
};

const emailTexts = {
    "Version 1": "Dutch:\nGeachte [NAME],\n\nEen groep Iraniërs voert al meer dan 75 dagen een sit-in uit voor het Nederlandse ministerie van Buitenlandse Zaken...",
    "Version 2": "Dutch:\nGeachte [NAME],\n\nEen groep Iraniërs houdt al meer dan 75 dagen een sit-in voor het Nederlandse ministerie van Buitenlandse Zaken...",
    "Version 3": "Dutch:\nGeachte [NAME],\n\nAl meer dan 75 dagen voert een groep Iraniërs een sit-in uit voor het ministerie van Buitenlandse Zaken...",
    "Version 4": "Dutch:\nGeachte [NAME],\n\nEen groep Iraniërs voert al meer dan 75 dagen een sit-in uit bij het ministerie van Buitenlandse Zaken...",
    "Version 5": "Dutch:\nGeachte [NAME],\n\nEen groep Iraniërs voert al 75+ dagen een sit-in uit bij het ministerie van Buitenlandse Zaken..."
};

// --- INITIALIZE ---
const SUPABASE_URL = 'https://tizmgyhtydyudjozgbgq.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_veX7XCXUYYswI-KOVRdK7A_B2rel21w';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const pSel = document.getElementById("sel_pol");
const vSel = document.getElementById("sel_ver");

Object.keys(politicians).forEach(p => { let o = document.createElement("option"); o.text = p; pSel.add(o); });
Object.keys(subjects).forEach(v => { let o = document.createElement("option"); o.text = v; vSel.add(o); });

let isGenerated = false;

// --- FUNCTIONS ---
async function logStats(action) {
    await client.from('email_stats').insert([{ 
        politician_name: pSel.value, 
        version_name: vSel.value, 
        action_type: action 
    }]);
    drawChart();
}

function doGenerate() {
    const pKey = pSel.value;
    const vKey = vSel.value;
    const pName = pKey.split(' (')[0];
    const user = document.getElementById("user_name").value || "An Iranian Resident";
    const city = document.getElementById("user_city").value || "";

    const to = politicians[pKey][0];
    const cc = politicians[pKey][1];
    const sub = subjects[vKey];
    const body = emailTexts[vKey].replace(/\[NAME\]/g, pName).replace(/\[USER\]/g, user).replace(/\[CITY\]/g, city);

    document.getElementById("out_sub").value = sub;
    document.getElementById("out_recp").value = `${to}; ${cc}`;
    document.getElementById("out_body").value = body;

    const eS = encodeURIComponent(sub);
    const eB = encodeURIComponent(body);

    // Update the actual links
    document.getElementById("lnk_web").href = `mailto:${to};${cc}?cc=${cc}&subject=${eS}&body=${eB}`;
    document.getElementById("lnk_mobile").href = `mailto:?cc=${to},${cc}&subject=${eS}&body=${eB}`;
    
    isGenerated = true;
    alert("Email Generated! Now click one of the 'Open Email' buttons.");
}

function checkReady(e) {
    if (!isGenerated) {
        e.preventDefault();
        alert("Please click 'Generate Email' first!");
    } else {
        const type = e.currentTarget.id === "lnk_web" ? "Web Click" : "Mobile Click";
        logStats(type);
    }
}

function doCopy() {
    if (!isGenerated) return alert("Generate first!");
    const text = `To: ${document.getElementById("out_recp").value}\nSubject: ${document.getElementById("out_sub").value}\n\n${document.getElementById("out_body").value}`;
    navigator.clipboard.writeText(text);
    logStats("Copy All");
    alert("Copied!");
}

let chartObj;
async function drawChart() {
    try {
        const { data } = await client.from('email_stats').select('politician_name, version_name');
        if (!data) return;

        const labels = Object.keys(politicians).map(l => l.split(' (')[0]);
        const versions = Object.keys(subjects);
        const colors = ['#2b6cb0', '#4299e1', '#63b3ed', '#90cdf4', '#bee3f8'];

        const datasets = versions.map((v, i) => ({
            label: v,
            data: Object.keys(politicians).map(p => data.filter(r => r.politician_name === p && r.version_name === v).length),
            backgroundColor: colors[i]
        }));

        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: datasets },
            options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
        });
    } catch (err) { console.error(err); }
}

window.onload = drawChart;
</script>
</body>
</html>
